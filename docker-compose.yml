services:
  api:
    build: .
    container_name: trustbridge_api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5555:5555"
      - "5556:5556"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: trustbridge_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trustbridge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trustbridge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: